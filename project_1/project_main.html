<html>  
<head>
    <title>Brendan Vogel's homepage</title>
    <link rel="stylesheet" type="text/css" href="project_style.css">
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #b5b1b1;
            color: #333;
        }
        h1 {
            color: #000000;
        }
        img {
            display: block;
            max-width: 200px;
            margin-top: 0px;
            border: 5px solid #000000;
            border-radius: 5%;
        }
        .content-row {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            margin-top: 20px;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        li {
            display: block;
            width: fit-content;
            margin: 10px auto;
            padding: 8px 14px;
            background-color: #FF8F00;
            border: #000000 solid 4px;
            border-radius: 10%;
            
        }
        a {
            text-decoration: none;
            color: #000000;
            font-size: 18px;
        }
        a:hover {
            text-decoration: underline;
        }
        footer {
            margin-top: 40px;
            text-align: center;
            color: #777;
        }
        header {
            background-color: #FF8F00;
            color: #000000;
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: black solid 4px;
        }
    </style>
</head>
